name: 8Bitdo Pro 3
vid: 0x2dc8
pid: 0x6009
svg: pro3.svg
primary: true
has_rumble: true
buttons:
  BTN_A: a
  BTN_B: b
  BTN_X: x
  BTN_Y: y
  BTN_TL: l
  BTN_TR: r
  BTN_SELECT: select
  BTN_START: start
  BTN_THUMBL: lstick
  BTN_THUMBR: rstick
  BTN_MODE: heart
  BTN_Z: lpaddle
  BTN_C: rpaddle
  BTN_TRIGGER_HAPPY1: l4
  BTN_TRIGGER_HAPPY2: r4
axes:
  ABS_HAT0X:
    binary:
      left: [-1, -1]
      right: [1, 1] 
  ABS_HAT0Y:
    binary:
      up: [-1, -1]
      down: [1, 1]
  ABS_BRAKE:
    #binary:
    #  l2: [1, 255]
    analog:
      mapped_to: l2
      min_value: 0
      max_value: 255
      default_value: 0
  ABS_GAS:
    #binary:
    #  r2: [1, 255]
    ptt: [1, 255]
    analog:
      mapped_to: r2
      min_value: 0
      max_value: 255
      default_value: 0
  ABS_X:
    stick:
      lstick:
        x:
          min_value: 0
          max_value: 255
          default_value: 127
  ABS_Y:
    stick:
      lstick:
        y:
          min_value: 0
          max_value: 255
          default_value: 127
  ABS_Z:
    stick:
      rstick:
        x:
          min_value: 0
          max_value: 255
          default_value: 127
  ABS_RZ:
    stick:
      rstick:
        y:
          min_value: 0
          max_value: 255
          default_value: 127

